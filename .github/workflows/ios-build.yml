name: Build iOS Simulator App (Appetize)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # Ensure we use a modern macOS runner

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build iOS App for Simulator
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Zip Simulator App Bundle
        run: |
          cd ios/build/Build/Products/Debug-iphonesimulator
          zip -r App.zip App.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Simulator-App-Bundle
          path: ios/build/Build/Products/Debug-iphonesimulator/App.zip
          retention-days: 7
